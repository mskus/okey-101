<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>101 Okey Pro — Canlı Çoklu Masa</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://www.gstatic.com/firebasejs/10.9.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.9.0/firebase-database-compat.js"></script>
</head>
<body>
    <div class="bg-orb orb-1"></div>
    <div class="bg-orb orb-2"></div>
    <div class="bg-orb orb-3"></div>

    <div class="container" id="app">
        <div class="loading-screen">
            <div class="spinner"></div>
            <p>Sunucuya bağlanılıyor...</p>
        </div>
    </div>

    <div id="toast-container"></div>

    <!-- Edit Score Modal -->
    <div id="edit-modal" class="modal-overlay">
        <div class="modal-card">
            <h3>✏️ Skor Düzenle</h3>
            <p id="edit-modal-desc"></p>
            <input type="number" id="edit-modal-input" placeholder="Yeni Değer">
            <div class="modal-actions">
                <button class="btn-outline" onclick="closeEditModal()">İptal</button>
                <button class="btn-primary" onclick="confirmEditScore()">Kaydet</button>
            </div>
        </div>
    </div>

    <!-- Join Room Password Modal -->
    <div id="password-modal" class="modal-overlay">
        <div class="modal-card">
            <h3>🔒 Şifreli Masa</h3>
            <p>Bu masa şifre korumalıdır.</p>
            <input type="password" id="password-modal-input" placeholder="Masa Şifresi">
            <div class="modal-actions">
                <button class="btn-outline" onclick="closePasswordModal()">İptal</button>
                <button class="btn-primary" onclick="confirmJoinWithPassword()">Gir</button>
            </div>
        </div>
    </div>

    <!-- Delete Room Password Modal -->
    <div id="delete-modal" class="modal-overlay">
        <div class="modal-card">
            <h3>🗑️ Masa Sil</h3>
            <p>Bu şifreli masayı silmek için şifreyi girin.</p>
            <input type="password" id="delete-modal-input" placeholder="Masa Şifresi">
            <div class="modal-actions">
                <button class="btn-outline" onclick="closeDeleteModal()">İptal</button>
                <button class="btn-danger" onclick="confirmDeleteWithPassword()">Sil</button>
            </div>
        </div>
    </div>

    <!-- Adisyon Price Edit Modal -->
    <div id="adisyon-price-modal" class="modal-overlay">
        <div class="modal-card">
            <h3>✏️ Fiyat Düzenle</h3>
            <p id="adisyon-price-desc"></p>
            <input type="number" id="adisyon-price-input" placeholder="Yeni Fiyat (₺)">
            <div class="modal-actions">
                <button class="btn-outline" onclick="closeAdisyonPriceModal()">İptal</button>
                <button class="btn-primary" onclick="confirmAdisyonPriceEdit()">Kaydet</button>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
