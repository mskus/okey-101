<section id="game-area" style="display:none;">
    <div class="table-controls">
        <button id="toggleTotals" class="info-btn">Toplam Skoru Gizle/Göster</button>
    </div>
    
    <table id="scoreTable">
        <thead>
            <tr id="tableHeader">
                <th>El No</th> </tr>
        </thead>
        <tbody id="scoreBody"></tbody>
        <tfoot id="totalsSection">
            <tr id="totalScores"></tr>
        </tfoot>
    </table>
    
    <div class="quick-penalties">
        <h3>Hızlı Ceza/Bitiş Ekle</h3>
        <div id="penaltyButtons"></div>
    </div>

    <div class="controls">
        <button id="addRound">Yeni El Ekle</button>
        <button id="finishGame" class="danger">Maçı Bitir ve Kaydet</button>
    </div>
</section>
